name = "b2b"
main = "src/index.js"
compatibility_date = "2025-01-01"

# D1 Database binding
[[d1_databases]]
binding = "DB"
database_name = "b2b_database"
database_id = "cdd66ca7-2002-48f1-a790-dfcc8e1a196a"

# Environment variables
[vars]
ENVIRONMENT = "development"

# R2 Storage for images
[[r2_buckets]]
binding = "IMAGES"
bucket_name = "b2b-product-images"

[[kv_namespaces]]
binding = "STATIC_ASSETS" #
id = "724d8a791da4440aa34f2be1c4ee5abd" # 从 Cloudflare 获取的 KV Namespace ID
